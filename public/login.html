<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Rastreamento de Encomendas</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { background: #f8fafc; font-family: system-ui, -apple-system, sans-serif; }
</style>
</head>
<body class="flex items-center justify-center h-screen">

<div class="bg-white p-10 rounded-xl shadow-lg w-full max-w-md">
    <h1 class="text-2xl font-bold text-sky-600 mb-6 text-center">📦 Rastreamento - Login</h1>
    
    <div id="msgLogin" class="mb-4 text-center font-medium"></div>
    
    <div class="mb-4">
        <label class="block mb-1 font-semibold" for="usuario">Usuário</label>
        <input id="usuario" type="text" class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-sky-400" placeholder="Digite seu usuário">
    </div>
    
    <div class="mb-6">
        <label class="block mb-1 font-semibold" for="senha">Senha</label>
        <input id="senha" type="password" class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-sky-400" placeholder="Digite sua senha">
    </div>
    
    <button id="btnLogin" class="w-full bg-sky-600 hover:bg-sky-700 text-white font-bold py-2 rounded-lg transition-colors">Entrar</button>
</div>

<script src="src/js/login.js"></script>
</body>
</html>
